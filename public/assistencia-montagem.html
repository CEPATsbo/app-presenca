<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cáritas - Linha de Montagem</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root { --bg: #f4f6f9; --white: #ffffff; --orange: #e67e22; --green: #27ae60; --red: #e74c3c; --grey: #7f8c8d; --primary: #2c3e50; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: var(--bg); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .nav-header { width: 100%; max-width: 1200px; display: flex; justify-content: space-between; margin-bottom: 20px; align-items: center; }
        .btn-voltar { background-color: var(--grey); color: white; padding: 10px 15px; border-radius: 8px; text-decoration: none; font-weight: bold; font-size: 0.9em; display: flex; align-items: center; gap: 8px; }
        .container { width: 100%; max-width: 1200px; }
        .resumo-dia { background: var(--white); padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 25px; display: flex; justify-content: space-around; width: 100%; text-align: center; position: relative; }
        .resumo-item h2 { margin: 0; color: var(--orange); font-size: 2.2em; }
        .grid-cestas { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; width: 100%; }
        .cesta-card { background: var(--white); border: 2px solid #ddd; border-radius: 12px; padding: 20px; transition: all 0.3s ease; position: relative; }
        .cesta-card.concluida { border-color: var(--green); background-color: #e8f5e9; }
        .item-montagem { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid #eee; cursor: pointer; }
        .item-montagem input[type="checkbox"] { width: 18px; height: 18px; cursor: pointer; accent-color: var(--green); }
        .marcado { text-decoration: line-through; color: var(--grey); opacity: 0.6; }
        .txt-falta { color: var(--red); font-weight: bold; font-size: 0.85em; margin: 10px 0; display: block; }
        .validade-info { font-size: 0.7em; color: var(--grey); display: block; margin-top: 2px; }
        .controles-sessao { width: 100%; max-width: 1200px; display: flex; justify-content: flex-end; margin-top: -15px; margin-bottom: 15px; }
        .btn-reset { background: none; border: none; color: var(--grey); cursor: pointer; font-size: 0.85em; text-decoration: underline; font-weight: 500; }
        .btn-reset:hover { color: var(--red); }
        .alerta-proximo-ciclo { background: #fff3cd; border: 1px solid #ffeeba; color: #856404; padding: 30px; border-radius: 12px; text-align: center; margin-top: 20px; }
        .val-critica { color: var(--red) !important; font-weight: bold; }
        .val-alerta { color: #d4a017 !important; font-weight: bold; }
        .badge-val { font-size: 0.7em; padding: 2px 5px; border-radius: 4px; margin-left: 5px; color: white; }
        .bg-critica { background: var(--red); }
        .bg-alerta { background: #d4a017; }
        .badge-personalizada { background: #9b59b6; color: white; padding: 2px 8px; border-radius: 4px; font-size: 0.65em; margin-left: 10px; vertical-align: middle; }
    </style>
</head>
<body>
    <header class="nav-header">
        <a href="/modulo-caritas.html" class="btn-voltar"><i class="fas fa-arrow-left"></i> Voltar ao Painel</a>
        <img src="/logo-cepat.png" alt="Logo" style="height: 50px;">
    </header>

    <main class="container">
        <h1><i class="fas fa-clipboard-check"></i> Linha de Montagem</h1>

        <div style="display: flex; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; background: #eee; padding: 10px; border-radius: 8px; font-size: 0.8em; justify-content: center;">
            <span style="display: flex; align-items: center; gap: 5px;"><i class="fas fa-square" style="color: var(--red);"></i> <b>Crítico:</b> Vence em até 15 dias</span>
            <span style="display: flex; align-items: center; gap: 5px;"><i class="fas fa-square" style="color: #d4a017;"></i> <b>Atenção:</b> Vence em até 45 dias</span>
            <span style="display: flex; align-items: center; gap: 5px;"><i class="fas fa-square" style="color: var(--grey);"></i> <b>Seguro:</b> Validade longa</span>
        </div>
    
        <div class="resumo-dia">
            <div class="resumo-item"><h2 id="meta-total">0</h2><p>Meta do Ciclo</p></div>
            <div class="resumo-item"><h2 id="entregas-feitas">0</h2><p>Já Entregues</p></div>
            <div class="resumo-item"><h2 id="cestas-restantes" style="color: var(--green);">0</h2><p>Restam Montar</p></div>
        </div>

        <div class="controles-sessao">
            <button id="trigger-reset" class="btn-reset"><i class="fas fa-sync-alt"></i> Finalizar Ciclo / Reset Mensal</button>
        </div>

        <div id="grid-cestas" class="grid-cestas">Carregando famílias e lotes...</div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, query, where, Timestamp, getDocs, orderBy, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore.js";
        import { protegerPagina } from '/auth.js';

        const firebaseConfig = { apiKey: "AIzaSyBV7RPjk3cFTqL-aIpflJcUojKg1ZXMLuU", authDomain: "voluntarios-ativos---cepat.firebaseapp.com", projectId: "voluntarios-ativos---cepat", storageBucket: "voluntarios-ativos---cepat.firebasestorage.app", messagingSenderId: "66122858261", appId: "1:66122858261:web:7fa21f1805463b5c08331c" };
        const db = getFirestore(initializeApp(firebaseConfig));

        let configPadrao = {}, entregasNoMes = 0, pickingMarcados = {}, mapaLotes = {}, nomesProdutos = {}, saldoEstoque = {}, listaFamiliasAtivas = [];

        protegerPagina(['super-admin','diretor','caritas']).then(() => { 
            iniciarSincronizacao();
            document.getElementById('trigger-reset').onclick = resetarPicking;
        });

        function iniciarSincronizacao() {
            onSnapshot(collection(db, "picking_estado"), snap => {
                pickingMarcados = {};
                snap.docs.forEach(d => pickingMarcados[d.id] = d.data());
                renderizar();
            });

            onSnapshot(collection(db, "estoque_caritas"), snap => {
                snap.docs.forEach(d => { 
                    saldoEstoque[d.id] = d.data().quantidade || 0; 
                    nomesProdutos[d.id] = d.data().nome; 
                });
                atualizarLotes();
            });

            onSnapshot(doc(db, "configuracoes", "cesta_padrao"), d => {
                if (d.exists()) { configPadrao = d.data().itens || {}; atualizarLotes(); }
            });

            onSnapshot(query(collection(db, "familiasAssistidas"), where("statusGeral", "==", "Ativa")), snap => {
                listaFamiliasAtivas = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                atualizarLotes();
            });

            const inicioMes = new Date(); inicioMes.setDate(1); inicioMes.setHours(0,0,0,0);
            onSnapshot(query(collection(db, "entregasCestas"), where("data", ">=", Timestamp.fromDate(inicioMes))), s => {
                entregasNoMes = s.size; 
                atualizarLotes();
            });
        }

        async function atualizarLotes() {
            if (Object.keys(nomesProdutos).length === 0) return;
            for (const pId of Object.keys(nomesProdutos)) {
                try {
                    const qLotes = query(collection(db, `estoque_caritas/${pId}/lotes`), orderBy("validade", "asc"));
                    const lSnap = await getDocs(qLotes);
                    let lotes = lSnap.docs.map(d => ({ id: d.id, ...d.data() })).filter(l => l.quantidade > 0);
                    const totalLotes = lotes.reduce((acc, curr) => acc + curr.quantidade, 0);
                    const extra = (saldoEstoque[pId] || 0) - totalLotes;
                    if (extra > 0) lotes.push({ validade: "9999-12-31", quantidade: extra, doador: "Saldo Geral" });
                    mapaLotes[pId] = lotes;
                } catch(e) { mapaLotes[pId] = [{ validade: "9999-12-31", quantidade: saldoEstoque[pId] || 0 }]; }
            }
            renderizar();
        }

        function renderizar() {
            const idsNoPicking = Object.keys(pickingMarcados);
            const montadasNoPicking = Object.values(pickingMarcados).filter(p => p.concluida).length;

            // NOVA LÓGICA DE META: 
            // A meta do ciclo atual é: Quem já recebeu + Quem está com picking aberto agora.
            // Isso ignora famílias novas que ainda não entraram no processo de montagem.
            const metaAjustada = Math.max(entregasNoMes, idsNoPicking.length);
            const restantesParaMontar = Math.max(0, idsNoPicking.length - montadasNoPicking);
            
            document.getElementById('meta-total').innerText = metaAjustada;
            document.getElementById('entregas-feitas').innerText = entregasNoMes;
            document.getElementById('cestas-restantes').innerText = restantesParaMontar;

            const grid = document.getElementById('grid-cestas');
            grid.innerHTML = "";

            // BLOQUEIO VISUAL: Só bloqueia se as entregas feitas cobrirem as montagens abertas.
            if (entregasNoMes >= metaAjustada && metaAjustada > 0 && restantesParaMontar === 0) {
                const hoje = new Date();
                const meses = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];
                grid.innerHTML = `
                    <div style='grid-column: 1/-1;'>
                        <div class="alerta-proximo-ciclo">
                            <i class="fas fa-calendar-check" style="font-size: 3em; color: var(--green); margin-bottom: 15px; display: block;"></i>
                            <h2>Ciclo de ${meses[hoje.getMonth()]} Concluído!</h2>
                            <p>Foram entregues ${entregasNoMes} cestas. Novos cadastros entrarão no próximo ciclo.</p>
                        </div>
                    </div>`;
                return;
            }

            let lotesVirtuais = JSON.parse(JSON.stringify(mapaLotes));
            const hoje = new Date();

            // Filtra o grid: Mostra apenas quem já está no picking deste mês.
            // No dia do reset (início do mês), ele mostrará todas as ativas novamente.
            const familiasExibir = idsNoPicking.length > 0 
                ? listaFamiliasAtivas.filter(f => idsNoPicking.includes(f.id))
                : listaFamiliasAtivas;

            familiasExibir.forEach((fam) => {
                const cestaId = fam.id;
                const est = pickingMarcados[cestaId] || { itens: {}, concluida: false };
                const card = document.createElement('div');
                card.id = `card-${cestaId}`;
                card.className = `cesta-card ${est.concluida ? 'concluida' : ''}`;
                
                let receita = (fam.tipoCesta === 'Personalizada' && fam.receitaPersonalizada) ? fam.receitaPersonalizada : configPadrao;
                let badge = fam.tipoCesta === 'Personalizada' ? '<span class="badge-personalizada">PERSONALIZADA</span>' : '';

                let html = `<h3>${fam.responsavel1.nome}${badge}</h3>`;
                const itensOrdenados = Object.entries(receita).sort((a,b) => (nomesProdutos[a[0]] || "").localeCompare(nomesProdutos[b[0]] || ""));

                itensOrdenados.forEach(([pId, qtdNec]) => {
                    let faltam = qtdNec, picksDestaCesta = [];
                    if (lotesVirtuais[pId]) {
                        for (let lote of lotesVirtuais[pId]) {
                            if (faltam <= 0) break;
                            const usar = Math.min(lote.quantidade, faltam);
                            if (usar > 0) { lote.quantidade -= usar; faltam -= usar; picksDestaCesta.push({ qtd: usar, val: lote.validade }); }
                        }
                    }
                    picksDestaCesta.forEach((p, idx) => {
                        const itemKey = `${pId}_${idx}`;
                        const isChecked = est.itens[itemKey] || false;
                        const dataF = p.val === "9999-12-31" ? "Geral" : p.val.split('-').reverse().join('/');
                        let cl = ""; if (p.val !== "9999-12-31") { const dV = new Date(p.val); const diff = Math.ceil((dV-hoje)/(1000*60*60*24)); if(diff<=15) cl="val-critica"; else if(diff<=45) cl="val-alerta"; }
                        html += `<label class="item-montagem ${isChecked ? 'marcado' : ''} ${cl}"><input type="checkbox" ${isChecked ? 'checked' : ''} onchange="salvarProgresso('${cestaId}', '${itemKey}', this.checked)"><span><b>${p.qtd}x</b> ${nomesProdutos[pId] || pId}<small class="validade-info">Validade: ${dataF}</small></span></label>`;
                    });
                    if (faltam > 0) html += `<span class="txt-falta">⚠️ FALTA ${faltam}x ${nomesProdutos[pId] || 'Item'}</span>`;
                });
                card.innerHTML = html;
                grid.appendChild(card);
            });
        }

        window.salvarProgresso = async (cestaId, itemKey, status) => {
            const docRef = doc(db, "picking_estado", cestaId);
            const atual = pickingMarcados[cestaId] || { itens: {}, concluida: false };
            atual.itens[itemKey] = status;
            const card = document.getElementById(`card-${cestaId}`);
            const total = card.querySelectorAll('input[type="checkbox"]').length;
            const marc = card.querySelectorAll('input[type="checkbox"]:checked').length;
            atual.concluida = (marc === total && total > 0);
            await setDoc(docRef, atual);
        };

        async function resetarPicking() {
            if (confirm("Resetar Picking para o novo ciclo? Isso limpará os nomes atuais e carregará todos os cadastros ativos.")) {
                const snap = await getDocs(collection(db, "picking_estado"));
                await Promise.all(snap.docs.map(d => deleteDoc(d.ref)));
                alert("Picking reiniciado!");
            }
        }
    </script>
</body>
</html>
