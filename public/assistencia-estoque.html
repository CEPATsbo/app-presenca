<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cáritas - Almoxarifado Social</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root { --bg: #f4f6f9; --white: #ffffff; --primary: #2c3e50; --orange: #e67e22; --green: #27ae60; --red: #e74c3c; --grey: #7f8c8d; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: var(--bg); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .nav-header { width: 100%; max-width: 1000px; display: flex; justify-content: space-between; margin-bottom: 20px; align-items: center; }
        .btn-voltar { background-color: var(--grey); color: white; padding: 10px 15px; border-radius: 8px; text-decoration: none; font-weight: bold; font-size: 0.9em; display: flex; align-items: center; gap: 8px; }
        .container { background: var(--white); padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1); width: 100%; max-width: 1000px; box-sizing: border-box; }
        h1 { color: var(--primary); margin-top: 0; border-bottom: 2px solid var(--orange); padding-bottom: 10px; margin-bottom: 25px; }
        .cesta-pronta-card { background: #e8f5e9; border: 2px solid var(--green); padding: 25px; border-radius: 12px; text-align: center; margin-bottom: 25px; }
        .cesta-pronta-card h2 { margin: 0; color: #1b5e20; font-size: 3.5em; }
        .cesta-pronta-card p { margin: 5px 0 0 0; font-weight: bold; color: #2e7d32; text-transform: uppercase; }
        .lista-pendencias { margin-top: 15px; text-align: left; background: rgba(255,255,255,0.7); padding: 15px; border-radius: 8px; border: 1px dashed var(--green); }
        .pendencia-item { color: var(--red); font-size: 0.9em; font-weight: bold; margin-bottom: 5px; display: flex; align-items: center; gap: 8px; }
        .secao-estoque { border: 1px solid #eee; padding: 20px; border-radius: 10px; background: #fafafa; margin-bottom: 20px; }
        
        /* ESTILOS DO SEMÁFORO NO ESTOQUE */
        .estoque-item { background: white; padding: 15px; border-radius: 8px; border: 1px solid #ddd; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border-left: 8px solid #ddd; }
        .borda-critica { border-left-color: var(--red) !important; }
        .borda-alerta { border-left-color: #f1c40f !important; }
        .borda-geral { border-left-color: #3498db !important; }
        .borda-segura { border-left-color: var(--green) !important; }

        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; padding: 30px; border-radius: 12px; width: 95%; max-width: 500px; max-height: 85vh; overflow-y: auto; }
        .form-group { display: flex; flex-direction: column; gap: 5px; margin-bottom: 15px; }
        .form-group label { font-size: 0.8em; font-weight: bold; color: #666; }
        .form-group input, .form-group select { padding: 12px; border: 1px solid #ccc; border-radius: 8px; font-size: 1em; }
        .btn-acao { border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; display: flex; align-items: center; gap: 8px; }
        .btn-ajuste { border: none; color: white; padding: 5px 12px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 1.2em; }
        .linha-receita { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; padding: 10px; background: #f9f9f9; border-radius: 8px; border: 1px solid #eee; }
        .btn-remover-linha { background: none; border: none; color: var(--red); cursor: pointer; font-size: 1.1em; padding: 5px; }
        .val-info { font-size: 0.85em; color: var(--grey); display: block; margin-top: 4px; }
    </style>
</head>
<body>

    <header class="nav-header">
        <a href="/modulo-caritas.html" class="btn-voltar"><i class="fas fa-arrow-left"></i> Voltar ao Painel</a>
        <img src="/logo-cepat.png" alt="Logo" style="height: 50px;">
    </header>

    <main class="container">
        <h1><i class="fas fa-boxes"></i> Almoxarifado Social</h1>

        <div style="display: flex; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; background: #f0f0f0; padding: 12px; border-radius: 8px; font-size: 0.85em; justify-content: center; border: 1px solid #ddd;">
            <span style="display: flex; align-items: center; gap: 5px;"><i class="fas fa-square" style="color: var(--red);"></i> <b>Crítico:</b> < 15 dias</span>
            <span style="display: flex; align-items: center; gap: 5px;"><i class="fas fa-square" style="color: #f1c40f;"></i> <b>Atenção:</b> < 45 dias</span>
            <span style="display: flex; align-items: center; gap: 5px;"><i class="fas fa-square" style="color: var(--green);"></i> <b>Seguro:</b> Validade OK</span>
            <span style="display: flex; align-items: center; gap: 5px;"><i class="fas fa-square" style="color: #3498db;"></i> <b>Geral:</b> Sem Validade</span>
        </div>

        <div id="painel-prontidao" class="cesta-pronta-card">
            <h2 id="qtd-cestas-montaveis">0</h2>
            <p>Cestas Prontas para Entrega</p>
            <div id="status-meta" style="margin-top: 10px; color: #1b5e20; font-weight: bold; font-size: 0.9em;">Sincronizando dados...</div>
            <div id="box-pendencias" class="lista-pendencias" style="display: none;"><div id="lista-pendencias"></div></div>
        </div>

        <div style="display: flex; gap: 10px; margin-bottom: 30px; justify-content: center; flex-wrap: wrap;">
            <button id="btn-config-cesta" class="btn-acao" style="background: var(--primary); color: white;"><i class="fas fa-cog"></i> Configurar Receita e Meta</button>
            <button id="btn-abrir-novo" class="btn-acao" style="background: var(--orange); color: white;"><i class="fas fa-plus"></i> + Novo Item</button>
            <button id="btn-whatsapp-lista" class="btn-acao" style="background: #25D366; color: white;"><i class="fab fa-whatsapp"></i> Gerar Lista p/ WhatsApp</button>
        </div>

        <div class="secao-estoque">
            <h3 style="color: #2980b9; margin: 0 0 15px 0;"><i class="fas fa-list"></i> Saldo Individual</h3>
            <div id="lista-produtos">Carregando estoque e validades...</div>
        </div>
    </main>

    <div id="modal-entrada-lote" class="modal">
        <div class="modal-content">
            <h3 id="titulo-entrada">Registrar Entrada</h3>
            <form id="form-entrada-lote">
                <input type="hidden" id="entrada-item-id">
                <div class="form-group"><label>Quantidade Recebida</label><input type="number" id="entrada-qtd" value="1" required></div>
                <div class="form-group"><label>Doador (Opcional)</label><input type="text" id="entrada-doador" placeholder="Ex: Mesa Brasil"></div>
                <div class="form-group"><label>Data de Validade</label><input type="date" id="entrada-validade" required></div>
                <div style="display: flex; gap: 10px; margin-top: 20px;">
                    <button type="button" onclick="fecharModais()" style="flex:1; border: 1px solid #ccc; border-radius: 8px;">Sair</button>
                    <button type="submit" style="flex:1; background: var(--green); color: white; border: none; border-radius: 8px; font-weight: bold;">Confirmar</button>
                </div>
            </form>
        </div>
    </div>

    <div id="modal-novo-item" class="modal">
        <div class="modal-content">
            <h3>Cadastrar Novo Insumo</h3>
            <form id="form-novo-item">
                <div class="form-group"><label>Nome do Produto</label><input type="text" id="novo-nome" required placeholder="Ex: ARROZ 5KG"></div>
                <div class="form-group"><label>Saldo Inicial</label><input type="number" id="novo-qtd" value="0" required></div>
                <div class="form-group"><label>Validade Inicial (Opcional)</label><input type="date" id="novo-validade"></div>
                <div style="display: flex; gap: 10px; margin-top: 20px;">
                    <button type="button" onclick="fecharModais()" style="flex:1; border: 1px solid #ccc; border-radius: 8px;">Sair</button>
                    <button type="submit" style="flex:1; background: var(--green); color: white; border: none; border-radius: 8px; font-weight: bold;">Salvar Item</button>
                </div>
            </form>
        </div>
    </div>

    <div id="modal-config" class="modal">
        <div class="modal-content">
            <h3>Configurar Entrega Social</h3>
            <div class="form-group" style="background: #f0f4f8; padding: 15px; border-radius: 10px;">
                <label>META DE ATENDIMENTO</label>
                <input type="number" id="input-meta" style="text-align:center; font-weight:bold;">
            </div>
            <div id="lista-composicao" style="margin-top: 15px;"></div>
            <div style="margin-top:20px; border-top:1px dashed #ccc; padding-top:15px;">
                <select id="select-item-estoque" style="width:100%; margin-bottom:10px; padding:10px; border-radius: 6px;"></select>
                <button type="button" onclick="adicionarLinhaCesta()" style="width:100%; background:var(--orange); color:white; border:none; padding:12px; border-radius:8px;">+ Adicionar na Receita</button>
            </div>
            <div style="display:flex; gap:10px; margin-top:20px;">
                <button onclick="fecharModais()" style="flex:1; border: 1px solid #ccc; border-radius: 8px;">Sair</button>
                <button id="btn-salvar-receita" style="flex:1; background:var(--green); color:white; border:none; border-radius:8px; font-weight:bold;">Salvar Tudo</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, updateDoc, setDoc, addDoc, serverTimestamp, query, where, Timestamp, getDocs, orderBy, increment, limit, deleteDoc } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore.js";
        import { protegerPagina } from '/auth.js';

        const firebaseConfig = { apiKey: "AIzaSyBV7RPjk3cFTqL-aIpflJcUojKg1ZXMLuU", authDomain: "voluntarios-ativos---cepat.firebaseapp.com", projectId: "voluntarios-ativos---cepat", storageBucket: "voluntarios-ativos---cepat.firebasestorage.app", messagingSenderId: "66122858261", appId: "1:66122858261:web:7fa21f1805463b5c08331c" };
        const db = getFirestore(initializeApp(firebaseConfig));
        
        let itensEstoque = [], configCesta = {}, metaGlobal = 14;

        protegerPagina(['super-admin','diretor','caritas']).then(() => {
            onSnapshot(collection(db, "estoque_caritas"), async snap => {
                const listaPromessas = snap.docs.map(async d => {
                    const qLote = query(collection(db, `estoque_caritas/${d.id}/lotes`), orderBy("validade", "asc"));
                    const lSnap = await getDocs(qLote);
                    const lotes = lSnap.docs.map(ld => ({ id: ld.id, ...ld.data() }));
                    const totalLotes = lotes.reduce((acc, curr) => acc + parseInt(curr.quantidade || 0), 0);
                    const quantidadeReal = Math.max(parseInt(d.data().quantidade || 0), totalLotes);
                    const proxVal = lotes.length > 0 ? lotes[0].validade : d.data().validade || "9999-12-31";
                    return { id: d.id.trim(), ...d.data(), quantidade: quantidadeReal, proxVal, lotes };
                });
                itensEstoque = await Promise.all(listaPromessas);
                renderizarListaEstoque();
                calcular();
            });

            onSnapshot(doc(db, "configuracoes", "cesta_padrao"), d => {
                if(d.exists()){
                    configCesta = d.data().itens || {};
                    metaGlobal = d.data().meta || 14;
                    calcular();
                }
            });
        });

        window.ajustarEstoque = async (id, delta, nome) => {
            const cleanId = id.trim();
            if (!cleanId) return;
            if (delta > 0) {
                document.getElementById('entrada-item-id').value = cleanId;
                document.getElementById('titulo-entrada').innerText = `Entrada: ${nome}`;
                document.getElementById('modal-entrada-lote').style.display = 'flex';
                return;
            }
            try {
                await updateDoc(doc(db, "estoque_caritas", cleanId), { quantidade: increment(-1) });
                const qLote = query(collection(db, `estoque_caritas/${cleanId}/lotes`), orderBy("validade", "asc"), limit(1));
                const lSnap = await getDocs(qLote);
                if (!lSnap.empty) {
                    const loteDoc = lSnap.docs[0];
                    const novaQtd = (loteDoc.data().quantidade || 0) - 1;
                    if (novaQtd <= 0) await deleteDoc(doc(db, `estoque_caritas/${cleanId}/lotes`, loteDoc.id));
                    else await updateDoc(doc(db, `estoque_caritas/${cleanId}/lotes`, loteDoc.id), { quantidade: novaQtd });
                }
                location.reload(); 
            } catch (e) { alert("Erro na baixa."); }
        };

        function renderizarListaEstoque() {
            const hoje = new Date();
            document.getElementById('lista-produtos').innerHTML = itensEstoque.map(i => {
                const valF = i.proxVal === "9999-12-31" ? "Não definida" : i.proxVal.split('-').reverse().join('/');
                let classeBorda = (i.proxVal === "9999-12-31") ? "borda-geral" : "borda-segura";
                if (i.proxVal !== "9999-12-31") {
                    const diffDias = Math.ceil((new Date(i.proxVal) - hoje) / (1000 * 60 * 60 * 24));
                    if (diffDias <= 15) classeBorda = "borda-critica";
                    else if (diffDias <= 45) classeBorda = "borda-alerta";
                }
                return `<div class="estoque-item ${classeBorda}"><div style="flex:1"><b>${i.nome}</b><span class="val-info">Próx: ${valF}</span><small style="color:#777">Saldo: ${i.quantidade}</small></div><div class="controles"><button class="btn-ajuste" style="background:var(--red)" onclick="window.ajustarEstoque('${i.id}', -1, '${i.nome}')">-</button><span style="font-weight:bold; min-width:30px; text-align:center;">${i.quantidade}</span><button class="btn-ajuste" style="background:var(--green)" onclick="window.ajustarEstoque('${i.id}', 1, '${i.nome}')">+</button></div></div>`;
            }).join('');
        }

        function calcular() {
            if (Object.keys(configCesta).length === 0 || itensEstoque.length === 0) return;
            let prontas = Infinity, pendencias = [];
            Object.entries(configCesta).forEach(([id, qtdNec]) => {
                const item = itensEstoque.find(i => i.id === id);
                const saldoValido = item ? item.quantidade : 0;
                const cap = Math.floor(saldoValido / qtdNec);
                if (cap < prontas) prontas = cap;
                if (saldoValido < (metaGlobal * qtdNec)) pendencias.push(`Faltam ${(metaGlobal * qtdNec) - saldoValido} un. de <b>${item ? item.nome : id}</b>.`);
            });
            document.getElementById('qtd-cestas-montaveis').innerText = prontas === Infinity ? 0 : prontas;
            document.getElementById('status-meta').innerText = `Meta: ${metaGlobal} | Prontas: ${prontas === Infinity ? 0 : prontas}`;
            const box = document.getElementById('box-pendencias');
            if (pendencias.length > 0) { box.style.display = 'block'; document.getElementById('lista-pendencias').innerHTML = pendencias.map(p => `<div class="pendencia-item">${p}</div>`).join(''); } else { box.style.display = 'none'; }
        }

        document.getElementById('btn-whatsapp-lista').onclick = () => {
            const h = new Date();
            let d3d = new Date(h.getFullYear(), h.getMonth(), 1);
            let dc = 0; while (dc < 3) { if (d3d.getDay() === 0) dc++; if (dc < 3) d3d.setDate(d3d.getDate() + 1); }
            const mesTxt = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"][(h.getDate() > d3d.getDate() ? h.getMonth() + 1 : h.getMonth()) % 12];
            
            let t = `*Queridos irmãos,*%0A%0ACom carinho e confiança na fraternidade que nos une, compartilhamos as necessidades atuais para a montagem de *${metaGlobal} cestas básicas* do nosso trabalho de assistência de *${mesTxt}*.%0A%0ACada item doado representa mais do que alimento material — é um gesto de amor, solidariedade e cuidado com aqueles que mais necessitam. Toda colaboração, por menor que pareça, soma-se como luz na construção deste trabalho.%0A%0A📦 *Itens em aberto:*%0A`;
            
            let f = false;
            Object.entries(configCesta).forEach(([id, q]) => {
                const i = itensEstoque.find(x => x.id === id);
                const s = i ? i.quantidade : 0;
                if (s < (metaGlobal * q)) { t += `• *${i ? i.nome : id}*: Faltam ${(metaGlobal * q) - s} un.%0A`; f = true; }
            });
            
            if (!f) t = `*Cáritas CEPAT*%0A✅ Gratidão irmãos! O estoque para o trabalho de *${mesTxt}* já está completo.`;
            else { 
                t += `%0ASe estiver ao seu alcance colaborar, receberemos com muita gratidão na *Casa Espírita Paulo de Tarso*.%0A%0AComo nos ensina a Doutrina Espírita, é na simplicidade da caridade que encontramos as maiores oportunidades de servir e amar.%0A%0ADesde já, nossa gratidão a todos que puderem contribuir. Que Jesus abençoe cada gesto de generosidade.`;
            }
            window.open(`https://wa.me/?text=${t}`, '_blank');
        };

        document.getElementById('form-entrada-lote').onsubmit = async (e) => {
            e.preventDefault();
            const id = document.getElementById('entrada-item-id').value;
            const qtd = parseInt(document.getElementById('entrada-qtd').value);
            await updateDoc(doc(db, "estoque_caritas", id), { quantidade: increment(qtd) });
            await addDoc(collection(db, `estoque_caritas/${id}/lotes`), { quantidade: qtd, validade: document.getElementById('entrada-validade').value, dataEntrada: serverTimestamp() });
            location.reload(); 
        };

        document.getElementById('form-novo-item').onsubmit = async (e) => {
            e.preventDefault();
            const docRef = await addDoc(collection(db, "estoque_caritas"), { nome: document.getElementById('novo-nome').value.toUpperCase(), quantidade: parseInt(document.getElementById('novo-qtd').value) });
            if (document.getElementById('novo-validade').value) await addDoc(collection(db, `estoque_caritas/${docRef.id}/lotes`), { quantidade: parseInt(document.getElementById('novo-qtd').value), validade: document.getElementById('novo-validade').value, dataEntrada: serverTimestamp() });
            location.reload();
        };

        document.getElementById('btn-abrir-novo').onclick = () => { document.getElementById('form-novo-item').reset(); document.getElementById('modal-novo-item').style.display='flex'; };
        document.getElementById('btn-config-cesta').onclick = () => {
            document.getElementById('input-meta').value = metaGlobal;
            document.getElementById('lista-composicao').innerHTML = Object.entries(configCesta).map(([id, qtd]) => {
                const item = itensEstoque.find(i => i.id === id);
                return `<div class="linha-receita" id="receita-${id}"><button type="button" class="btn-remover-linha" onclick="removerLinhaDaReceita('${id}')"><i class="fas fa-trash-alt"></i></button><span>${item ? item.nome : id}</span><input type="number" class="input-receita" data-id="${id}" value="${qtd}" style="width:60px;"></div>`;
            }).join('');
            document.getElementById('select-item-estoque').innerHTML = '<option value="">Adicionar...</option>' + itensEstoque.map(i => `<option value="${i.id}">${i.nome}</option>`).join('');
            document.getElementById('modal-config').style.display = 'flex';
        };
        window.removerLinhaDaReceita = (id) => document.getElementById(`receita-${id}`).remove();
        window.adicionarLinhaCesta = () => {
            const id = document.getElementById('select-item-estoque').value;
            if (!id || document.querySelector(`.input-receita[data-id="${id}"]`)) return;
            const item = itensEstoque.find(x => x.id === id);
            const div = document.createElement('div'); div.className = "linha-receita"; div.id = `receita-${id}`;
            div.innerHTML = `<button type="button" class="btn-remover-linha" onclick="removerLinhaDaReceita('${id}')"><i class="fas fa-trash-alt"></i></button><span>${item.nome}</span><input type="number" class="input-receita" data-id="${id}" value="1" style="width:60px;">`;
            document.getElementById('lista-composicao').appendChild(div);
        };
        document.getElementById('btn-salvar-receita').onclick = async () => {
            const novosItens = {};
            document.querySelectorAll('.input-receita').forEach(inp => { novosItens[inp.dataset.id] = parseInt(inp.value); });
            await setDoc(doc(db, "configuracoes", "cesta_padrao"), { itens: novosItens, meta: parseInt(document.getElementById('input-meta').value) });
            location.reload();
        };
        window.fecharModais = () => document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
    </script>
</body>
</html>
