<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalhes do Atendimento - Vinha de Luz</title>
    <style>
        :root { --cor-primaria: #8e44ad; --cor-borda: #ddd; --fundo-desabilitado: #e9ecef; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; }
        .container { width: 100%; max-width: 900px; background-color: white; padding: 30px; border-radius: 12px; box-shadow: 0 6px 24px rgba(0,0,0,0.1); margin: auto; }
        .nav-voltar { width: 100%; max-width: 900px; margin: auto; margin-bottom: 20px; }
        .btn, .btn-voltar { background-color: var(--cor-primaria); color: white; border: none; padding: 12px 20px; border-radius: 8px; font-weight: bold; font-size: 1em; text-decoration: none; cursor: pointer; transition: background-color 0.3s; display: inline-block; text-align: center;}
        .btn:disabled { background-color: #ccc; cursor: not-allowed; opacity: 0.7; }
        .btn-voltar { background-color: #6c757d; }
        .btn-success { background-color: #28a745; }
        .btn-secondary { background-color: #6c757d; }
        h1, h3 { color: #333; text-align: center; }
        fieldset { border: 1px solid var(--cor-borda); border-radius: 8px; padding: 20px; margin-bottom: 20px; }
        legend { font-weight: bold; font-size: 1.2em; color: var(--cor-primaria); padding: 0 10px; }
        .form-item { display: flex; flex-direction: column; }
        .form-item label { margin-bottom: 5px; font-weight: bold; color: #555; }
        .form-item input, .form-item select, .form-item textarea, .form-item .readonly-input { padding: 10px; border-radius: 6px; border: 1px solid #ccc; font-size: 1em; width: 100%; box-sizing: border-box; font-family: inherit; }
        .form-item .readonly-input { background-color: var(--fundo-desabilitado); }
        .form-item input:disabled, .form-item select:disabled, .form-item textarea:disabled { background-color: var(--fundo-desabilitado); cursor: not-allowed; }
        .erro { color: #dc3545; font-weight: bold; text-align: center; }
        .hidden { display: none; }
        
        .info-header { background-color: #f8f9fa; padding: 15px; border-radius: 6px; margin-bottom: 20px; border: 1px solid var(--cor-borda); }
        .info-grid { display: flex; justify-content: space-around; align-items: center; flex-wrap: wrap; gap: 10px; }
        .info-item { text-align: center; }
        .info-item label { font-size: 0.9em; color: #555; margin-bottom: 4px; display: block; }
        .info-item span { font-weight: bold; font-size: 1.1em; color: #333; }

        .pedido-online-box {
            background-color: #fcf8ff;
            padding: 15px 20px;
            border-radius: 8px;
            border-left: 5px solid var(--cor-primaria);
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(142, 68, 173, 0.05);
        }
        .pedido-online-box h4 { margin-top: 0; color: var(--cor-primaria); margin-bottom: 12px; font-size: 1.1em; display: flex; align-items: center; gap: 8px; }
        .pedido-online-box p { margin: 0 0 8px 0; color: #444; line-height: 1.4; }
        .pedido-online-box p:last-child { margin-bottom: 0; }
        .pedido-online-box .destaque { background-color: white; padding: 10px; border-radius: 6px; border: 1px solid #eee; margin-top: 5px; white-space: pre-wrap; font-style: italic; color: #555; }
        .upload-box { margin-top: 15px; padding: 15px; background-color: #fdfdfd; border: 1px dashed #bbb; border-radius: 8px; }
    </style>
</head>
<body>
    <nav class="nav-voltar"><a href="/arquivo-geral-vl.html" class="btn-voltar">⬅ Voltar para o Arquivo VL</a></nav>
    <div id="acesso-negado" class="container hidden"><h1>Acesso Negado</h1></div>

    <div id="main-content" class="container">
        <h1>Detalhes do Atendimento - Vinha de Luz</h1>
        <div id="formulario-container">
            <p>Carregando dados do atendimento...</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-app.js";
        import { 
            getFirestore, collection, doc, getDoc, query, where, Timestamp, 
            getDocs, writeBatch, serverTimestamp, increment, setDoc, addDoc, onSnapshot
        } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore.js";
        import { getStorage, ref as storageRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-storage.js";
        import { getAuth } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-auth.js";
        import { protegerPagina } from '/auth.js';

        const firebaseConfig = {
            apiKey: "AIzaSyBV7RPjk3cFTqL-aIpflJcUojKg1ZXMLuU",
            authDomain: "voluntarios-ativos---cepat.firebaseapp.com",
            projectId: "voluntarios-ativos---cepat",
            storageBucket: "voluntarios-ativos---cepat.firebasestorage.app",
            messagingSenderId: "66122858261",
            appId: "1:66122858261:web:7fa21f1805463b5c08331c"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth();
        const storage = getStorage(app); 

        protegerPagina(['entrevistador', 'tesoureiro', 'diretor', 'super-admin']).then(user => {
            inicializarPagina(user);
        }).catch(err => {
            document.getElementById('acesso-negado').classList.remove('hidden');
            document.getElementById('main-content').classList.add('hidden');
        });

        function inicializarPagina(user) {
            const db = getFirestore();
            const tratamentosRef = collection(db, 'tratamentos_vl');
            const atendimentosRef = collection(db, 'atendimentos_vl');
            const logAuditoriaRef = collection(db, 'log_auditoria');

            const formularioContainer = document.getElementById('formulario-container');
            const params = new URLSearchParams(window.location.search);
            const atendimentoIdParaEditar = params.get('atendimentoId');

            if (atendimentoIdParaEditar) {
                carregarFormularioParaEdicao(atendimentoIdParaEditar);
            } else {
                formularioContainer.innerHTML = `<p class="erro">Nenhum atendimento selecionado.</p>`;
            }

            async function registrarLog(acao, detalhes) {
                try {
                    const newLogRef = doc(logAuditoriaRef); 
                    await setDoc(newLogRef, { 
                        timestamp: serverTimestamp(), autor: { uid: user.uid, nome: user.displayName || 'Usuário do Sistema' }, acao: acao, detalhes: detalhes
                    });
                } catch (error) { console.error("Erro ao registrar log:", error); }
            }

            function manipularEstadoFormulario(travado) {
                const form = formularioContainer.querySelector('fieldset');
                if (!form) return;
                
                form.querySelectorAll('#atendimento-notas, #atendimento-orientacoes, #upload-carta, #upload-audio, #btn-transcrever-audio, #btn-marcar-retorno, input[name="decisao-extensao"]').forEach(el => {
                    if (el) el.disabled = travado;
                });

                const btnSalvar = document.getElementById('btn-salvar-atendimento');
                if(btnSalvar) btnSalvar.style.display = travado ? 'none' : 'block';

                const btnHabilitarExistente = document.getElementById('btn-habilitar-edicao');
                if(btnHabilitarExistente) btnHabilitarExistente.remove();
                if (travado) {
                    const btnHabilitar = document.createElement('button');
                    btnHabilitar.id = 'btn-habilitar-edicao';
                    btnHabilitar.className = 'btn btn-secondary';
                    btnHabilitar.style.width = '100%';
                    btnHabilitar.style.marginTop = '10px';
                    btnHabilitar.innerHTML = '🔒 Habilitar Edição';
                    btnHabilitar.type = 'button';
                    btnHabilitar.onclick = () => { if (confirm('Tem certeza que deseja alterar este registro e liberar anexos?')) { manipularEstadoFormulario(false); } };
                    form.appendChild(btnHabilitar);
                }
            }

            async function carregarFormularioParaEdicao(atendimentoId) {
                const atendimentoDocRef = doc(db, 'atendimentos_vl', atendimentoId);
                const atendimentoDoc = await getDoc(atendimentoDocRef);
                if (!atendimentoDoc.exists()) { formularioContainer.innerHTML = `<p class="erro">Atendimento não encontrado.</p>`; return; }
                
                const atendimento = { id: atendimentoDoc.id, ...atendimentoDoc.data() };
                if (!atendimento.tratamentoId) { formularioContainer.innerHTML = `<p class="erro">Atendimento sem tratamento vinculado.</p>`; return; }
                
                const assistidoDoc = await getDoc(doc(db, 'assistidos', atendimento.assistidoId));
                const tratamentoDoc = await getDoc(doc(db, 'tratamentos_vl', atendimento.tratamentoId));
                
                if (!assistidoDoc.exists() || !tratamentoDoc.exists()) { formularioContainer.innerHTML = `<p class="erro">Dados do assistido ou tratamento não encontrados.</p>`; return; }
                
                const assistido = { id: assistidoDoc.id, ...assistidoDoc.data() };
                const tratamento = tratamentoDoc.data();
                
                const formHtml = criarFormulario(atendimento, assistido, tratamento);
                formularioContainer.innerHTML = formHtml;
                preencherFormulario(atendimento, tratamento); 
                
                const travar = atendimento.detalhes_preenchidos === true;
                manipularEstadoFormulario(travar);

                document.getElementById('btn-salvar-atendimento')?.addEventListener('click', () => salvarAtendimentoVL(atendimento, atendimentoDocRef, tratamentoDoc.ref, tratamento, user));
                document.getElementById('btn-marcar-retorno')?.addEventListener('click', () => marcarNovoRetorno(atendimento, tratamentoDoc.ref, tratamento));
                
                // MÁGICA DO ÁUDIO
                configurarMotorDeAudio(atendimento);
            }
            
            // --- INÍCIO DA FUNÇÃO DO MOTOR DE ÁUDIO ---
            function configurarMotorDeAudio(atendimento) {
                const btnTranscrever = document.getElementById('btn-transcrever-audio');
                if(!btnTranscrever) return;

                btnTranscrever.addEventListener('click', async () => {
                    const inputAudio = document.getElementById('upload-audio');
                    const checkManifestacao = document.getElementById('check-manifestacao');
                    const statusAudio = document.getElementById('status-audio');
                    
                    if (!inputAudio.files || inputAudio.files.length === 0) {
                        alert('Por favor, selecione pelo menos um arquivo de áudio.'); return;
                    }

                    const isManifestacao = checkManifestacao.checked;
                    const arquivos = Array.from(inputAudio.files);
                    btnTranscrever.disabled = true;

                    for (let i = 0; i < arquivos.length; i++) {
                        const file = arquivos[i];
                        statusAudio.innerHTML = `<span style="color:#e67e22;">⏳ Enviando e transcrevendo áudio ${i+1} de ${arquivos.length}... Isso pode levar um minuto.</span>`;
                        
                        try {
                            // 1. Sobe o áudio para o Storage
                            const sRef = storageRef(storage, `audios_mediunicos/vl_${atendimento.id}_${Date.now()}_${i}_${file.name}`);
                            const snapshot = await uploadBytes(sRef, file);
                            const url = await getDownloadURL(snapshot.ref);
                            
                            // 2. Aciona o Robô criando o documento na comunicacoes_mediunicas
                            const docRef = await addDoc(collection(db, 'comunicacoes_mediunicas'), {
                                urlAudio: url,
                                status: 'processando',
                                nomeArquivo: file.name,
                                assistidoId: atendimento.assistidoId,
                                atendimentoId: atendimento.id,
                                origem: 'vinha_de_luz',
                                criadoEm: serverTimestamp()
                            });

                            // 3. Fica "escutando" a resposta do Robô em tempo real
                            await new Promise((resolve, reject) => {
                                const unsubscribe = onSnapshot(docRef, (docSnap) => {
                                    const data = docSnap.data();
                                    if (data && data.status === 'concluido') {
                                        unsubscribe();
                                        const transcricao = data.transcricao || 'Áudio não compreendido.';
                                        const textoFormatado = `\n[Transcrição Automática - ${file.name}]:\n${transcricao}\n`;
                                        
                                        if (isManifestacao) {
                                            const notas = document.getElementById('atendimento-notas');
                                            notas.value += (notas.value ? '\n' : '') + textoFormatado;
                                        } else {
                                            const ori = document.getElementById('atendimento-orientacoes');
                                            ori.value += (ori.value ? '\n' : '') + textoFormatado;
                                        }
                                        resolve();
                                    } else if (data && data.status === 'erro') {
                                        unsubscribe();
                                        alert(`Erro ao transcrever o arquivo ${file.name}: ${data.erroDetalhe}`);
                                        resolve(); // Segue pro próximo mesmo com erro
                                    }
                                }, (err) => {
                                    unsubscribe();
                                    reject(err);
                                });
                            });
                        } catch (error) {
                            console.error("Erro no processamento do áudio:", error);
                            alert(`Falha no processamento do arquivo ${file.name}`);
                        }
                    }
                    
                    statusAudio.innerHTML = `<span style="color:#28a745;">✅ Transcrição concluída! O texto foi inserido nos campos abaixo. Você pode editá-lo antes de salvar a ficha.</span>`;
                    inputAudio.value = ''; // Esvazia o input
                    btnTranscrever.disabled = false;
                });
            }
            // --- FIM DA FUNÇÃO DO MOTOR DE ÁUDIO ---

            async function marcarNovoRetorno(atendimentoAnterior, tratamentoDocRef, tratamento) {
                const btn = document.getElementById('btn-marcar-retorno');
                btn.disabled = true;

                const totalPermitido = (tratamento.retornos_solicitados || 0) + 1;
                const realizados = tratamento.atendimentos_realizados || 0;

                if (realizados >= totalPermitido) {
                    alert(`Este assistido já completou os ${totalPermitido} atendimentos autorizados.`);
                    btn.disabled = false; return;
                }
                
                const hojeInicio = new Date();
                hojeInicio.setHours(0, 0, 0, 0);
                const qCheckHoje = query(atendimentosRef, 
                    where("tratamentoId", "==", atendimentoAnterior.tratamentoId),
                    where("dataAtendimento", ">=", Timestamp.fromDate(hojeInicio))
                );
                const snapshotHoje = await getDocs(qCheckHoje);
                if (!snapshotHoje.empty) { alert('Este assistido já registrou um retorno hoje.'); btn.disabled = false; return; }

                if (!confirm(`Confirmar novo retorno (Atendimento ${realizados + 1} de ${totalPermitido})?`)) { btn.disabled = false; return; }

                try {
                    const batch = writeBatch(db);
                    const dataAtual = serverTimestamp();
                    
                    batch.set(doc(atendimentosRef), {
                        assistidoId: tratamento.assistidoId, tratamentoId: tratamentoDocRef.id,
                        dataAtendimento: dataAtual, semana: realizados + 1,
                        notas: '', orientacoes: '', atendente: user.displayName, detalhes_preenchidos: false
                    });
                    batch.update(tratamentoDocRef, { atendimentos_realizados: increment(1), status: (realizados + 1) === totalPermitido ? 'concluido' : 'ativo' });
                    await batch.commit();
                    
                    alert(`Retorno ${realizados + 1} registrado com sucesso!`);
                    await registrarLog('Registro Retorno (VL)', { assistidoId: tratamento.assistidoId, tratamentoId: tratamentoDocRef.id, atendimentoNum: realizados + 1 });
                    location.reload();
                } catch (error) {
                    alert("Falha ao registrar retorno: " + error.message);
                    btn.disabled = false;
                }
            }

            async function salvarAtendimentoVL(atendimento, atendimentoDocRef, tratamentoDocRef, tratamento, user) {
                const btn = document.getElementById('btn-salvar-atendimento');
                const atendimentoNotas = document.getElementById('atendimento-notas').value.trim();
                const atendimentoOrientacoes = document.getElementById('atendimento-orientacoes').value.trim();

                let retornosSolicitados = tratamento.retornos_solicitados || 3; 
                let statusFinal = tratamento.status || 'ativo'; 

                const radioExtensao = document.querySelector('input[name="decisao-extensao"]:checked');
                
                if (radioExtensao) {
                    if (radioExtensao.value === 'estender') {
                        retornosSolicitados = atendimento.semana; statusFinal = 'estendido';
                    } else if (radioExtensao.value === 'concluir') {
                        retornosSolicitados = atendimento.semana - 1; statusFinal = 'concluido';
                    }
                } else {
                    const totalAtend = (tratamento.retornos_solicitados || 0) + 1;
                    if (atendimento.semana === totalAtend && atendimento.semana < 4) { statusFinal = 'concluido'; }
                }

                btn.disabled = true; btn.textContent = 'Salvando Atendimento e Anexos...';
                
                try {
                    let cartasUrlsExistentes = atendimento.cartasUrls || [];
                    if (atendimento.cartaUrl && !cartasUrlsExistentes.includes(atendimento.cartaUrl)) { cartasUrlsExistentes.push(atendimento.cartaUrl); }

                    const inputCarta = document.getElementById('upload-carta');
                    let novasUrls = [];
                    
                    if (inputCarta && inputCarta.files.length > 0) {
                        btn.textContent = `Enviando ${inputCarta.files.length} imagem(ns)... Aguarde.`;
                        for (let i = 0; i < inputCarta.files.length; i++) {
                            const file = inputCarta.files[i];
                            const sRef = storageRef(storage, `cartas_vl/${atendimento.id}_${Date.now()}_${i}_${file.name}`);
                            const snapshot = await uploadBytes(sRef, file);
                            const url = await getDownloadURL(snapshot.ref);
                            novasUrls.push(url);
                        }
                    }

                    const batch = writeBatch(db);
                    
                    const dadosAtendimento = {
                        atendente: user.displayName || 'Usuário do Sistema',
                        notas: atendimentoNotas,
                        orientacoes: atendimentoOrientacoes,
                        detalhes_preenchidos: true
                    };
                    
                    if (novasUrls.length > 0 || cartasUrlsExistentes.length > 0) {
                        dadosAtendimento.cartasUrls = [...cartasUrlsExistentes, ...novasUrls];
                    }

                    batch.update(atendimentoDocRef, dadosAtendimento);
                    batch.update(tratamentoDocRef, { retornos_solicitados: retornosSolicitados, status: statusFinal });
                    await batch.commit();
                    
                    await registrarLog('Preenchimento Atendimento (VL)', { assistidoId: atendimento.assistidoId, atendimentoId: atendimento.id, semana: atendimento.semana, statusTratamento: statusFinal, anexosNovos: novasUrls.length });
                    alert('Atendimento salvo com sucesso!');
                    manipularEstadoFormulario(true);
                    location.reload(); 

                } catch (error) {
                    console.error("Erro ao salvar atendimento:", error);
                    alert("Falha ao salvar. Tente novamente.");
                    btn.disabled = false; btn.textContent = 'Salvar Alterações';
                }
            }

            function preencherFormulario(atendimento, tratamento) {
                const notasInput = document.getElementById('atendimento-notas');
                const orientacoesInput = document.getElementById('atendimento-orientacoes');
                
                let notasText = atendimento.notas || '';
                if (!atendimento.detalhes_preenchidos && tratamento.origem === 'online' && notasText.includes('Pedido Online Recebido')) {
                    notasText = '';
                }

                notasInput.value = notasText;
                if (orientacoesInput) orientacoesInput.value = atendimento.orientacoes || '';
            }

            function criarFormulario(atendimento, assistido, tratamento) {
                const dataAtendimento = atendimento.dataAtendimento ? atendimento.dataAtendimento.toDate().toLocaleDateString('pt-br') : "Data Pendente";
                const atendimentoNum = atendimento.semana || '?';
                const totalAtendimentos = (tratamento.retornos_solicitados || 0) + 1;
                const statusTratamento = tratamento.status || 'N/A';
                
                let botaoRetornoHtml = '';
                const hoje = new Date().toLocaleDateString('pt-br');
                const naoEhDeHoje = dataAtendimento !== hoje;
                
                if (statusTratamento === 'ativo' || statusTratamento === 'estendido') {
                    if (atendimentoNum === tratamento.atendimentos_realizados && atendimentoNum < totalAtendimentos && naoEhDeHoje) {
                        botaoRetornoHtml = `<button id="btn-marcar-retorno" type="button" class="btn btn-success" style="width: 100%; margin-top: 15px;">Registrar Próximo Retorno (Hoje)</button>`;
                    }
                } else if (statusTratamento === 'concluido') {
                    botaoRetornoHtml = `<p style="text-align:center; font-weight:bold; color:#28a745; margin-top:15px;">Tratamento concluído (Alta).</p>`;
                }

                let infoSolicitanteHtml = '';
                if (tratamento.origem === 'online') {
                    const motivo = tratamento.informacoesIniciais || tratamento.pedidoInformacoes || 'Sem informações fornecidas.';
                    infoSolicitanteHtml = `
                    <div class="pedido-online-box">
                        <h4>🌍 Informações do Pedido Online</h4>
                        <p><strong>Solicitante:</strong> ${tratamento.nomeSolicitante || 'N/A'} ${tratamento.contatoSolicitante ? `(${tratamento.contatoSolicitante})` : ''}</p>
                        <p><strong>Idade do Assistido:</strong> ${tratamento.idadeAssistidoOnline || 'N/A'} anos</p>
                        <p style="margin-top: 10px;"><strong>Motivo / Pedido de Prece:</strong></p>
                        <div class="destaque">${motivo}</div>
                    </div>`;
                }

                // 🎙️ CAIXA DO ASSISTENTE DE ÁUDIO
                let assistenteAudioHtml = `
                    <div class="pedido-online-box" style="background-color: #f0f7ff; border-left-color: #007bff;">
                        <h4 style="color: #007bff;">🎙️ Assistente de Transcrição Mediúnica</h4>
                        <p style="font-size: 0.9em; margin-bottom: 10px;">Selecione os áudios gravados pelos médiuns (pode ser mais de um). A Inteligência Artificial transcreverá as falas e preencherá os campos abaixo automaticamente para sua edição.</p>
                        
                        <div style="display: flex; gap: 15px; flex-wrap: wrap; align-items: center;">
                            <input type="file" id="upload-audio" accept="audio/*" multiple style="flex: 1; min-width: 200px; padding: 8px; border: 1px solid #ccc; background: white; border-radius: 6px;">
                            
                            <label style="display: flex; align-items: center; gap: 5px; font-weight: bold; cursor: pointer; color: #d35400;">
                                <input type="checkbox" id="check-manifestacao">
                                É Manifestação? (Enviar p/ Observações)
                            </label>
                            
                            <button type="button" id="btn-transcrever-audio" class="btn" style="background-color: #007bff; color: white;">Transcrever Áudios</button>
                        </div>
                        <div id="status-audio" style="margin-top: 10px; font-weight: bold; font-size: 0.9em;"></div>
                    </div>
                `;

                // GERAÇÃO DOS BOTÕES MÚLTIPLOS DE CARTAS PSICOGRAFADAS
                let cartasSalvas = atendimento.cartasUrls || [];
                if (atendimento.cartaUrl && cartasSalvas.length === 0) { cartasSalvas = [atendimento.cartaUrl]; }

                let linksCartasHtml = '';
                if (cartasSalvas.length > 0) {
                    linksCartasHtml = '<div style="margin: 10px 0; display: flex; gap: 10px; flex-wrap: wrap;">';
                    cartasSalvas.forEach((url, index) => {
                        linksCartasHtml += `<a href="${url}" target="_blank" class="btn" style="background-color: #8e44ad; font-size: 0.9em; display: inline-block;">👁️ Ver Pág. ${index + 1}</a>`;
                    });
                    linksCartasHtml += '</div><label style="font-size: 0.85em; color: #666;">Você pode anexar páginas adicionais selecionando as imagens abaixo:</label>';
                } else {
                    linksCartasHtml = '<p style="font-size: 0.85em; color: #666; margin-top: 0;">Se houver uma mensagem recebida para este assistido (mesmo com várias páginas), você pode selecionar todas as fotos dela aqui.</p>';
                }

                let cartaPsicografadaHtml = `
                    <div class="form-item upload-box">
                        <label>✉️ Carta Psicografada / Mensagem (Opcional):</label>
                        ${linksCartasHtml}
                        <input type="file" id="upload-carta" accept="image/*" multiple style="background: white; margin-top: 5px;">
                    </div>
                `;

                let extensaoTratamentoHtml = '';
                if (atendimentoNum >= 4 && atendimentoNum === totalAtendimentos) {
                    extensaoTratamentoHtml = `
                    <fieldset style="border-color: #17a2b8; margin-top: 20px;">
                        <legend>Definição do Colegiado (Semana ${atendimentoNum})</legend>
                        <div class="form-item">
                            <label>O tratamento chegou à sua ${atendimentoNum}ª semana. Como a equipe deseja prosseguir?</label>
                            <div style="display: flex; gap: 20px; margin-top: 10px;">
                                <label style="display: flex; align-items: center; gap: 5px; cursor: pointer; color: #dc3545; font-weight: bold;">
                                    <input type="radio" name="decisao-extensao" value="concluir" checked> Dar Alta (Concluir Tratamento)
                                </label>
                                <label style="display: flex; align-items: center; gap: 5px; cursor: pointer; color: #17a2b8; font-weight: bold;">
                                    <input type="radio" name="decisao-extensao" value="estender"> Estender Tratamento (+1 Retorno)
                                </label>
                            </div>
                        </div>
                    </fieldset>`;
                }

                let linkEncaminhamentoSamaritanos = `
                    <hr style="border: 0; height: 1px; background: #ddd; margin: 25px 0;">
                    <a href="/recepcao-samaritanos.html?origem=vl_ficha&assistidoId=${assistido.id}&atendimentoId=${atendimento.id}" class="btn" style="background-color: #e67e22; width: 100%; text-align: center; display: block; box-sizing: border-box; text-decoration: none;">
                        ➕ Encaminhar para Samaritanos (Espírito / Assistido)
                    </a>
                `;

                return `<fieldset>
                            <legend>Detalhes do Atendimento (VL)</legend>
                            
                            <div class="info-header">
                                <div class="info-grid">
                                    <div class="info-item">
                                        <label>Assistido</label>
                                        <span>${assistido.nome}</span>
                                    </div>
                                    <div class="info-item">
                                        <label>Data deste Atendimento</label>
                                        <span>${dataAtendimento}</span>
                                    </div>
                                    <div class="info-item">
                                        <label>Contagem (Atendimento / Total)</label>
                                        <span>${atendimentoNum} / ${totalAtendimentos}</span>
                                    </div>
                                </div>
                                ${botaoRetornoHtml}
                            </div>
                            
                            ${infoSolicitanteHtml}
                            
                            ${assistenteAudioHtml}
                            
                            <div class="form-item" style="margin-top: 15px;">
                                <label for="atendimento-orientacoes">Orientações dos Espíritos (Mensagens e Recomendações):</label>
                                <textarea id="atendimento-orientacoes" rows="5" placeholder="Registre aqui as orientações passadas através da mediunidade..."></textarea>
                            </div>

                            <div class="form-item" style="margin-top: 15px;">
                                <label for="atendimento-notas">Observações Gerais (Triagem e Atendimento):</label>
                                <textarea id="atendimento-notas" rows="4" placeholder="Observações do atendente, evolução do assistido, etc..."></textarea>
                            </div>

                            ${cartaPsicografadaHtml}
                            
                            ${extensaoTratamentoHtml}
                            
                            <button id="btn-salvar-atendimento" type="button" class="btn btn-primary" style="width: 100%; margin-top: 20px;">Salvar Alterações (Ficha e Anexos)</button>

                            ${linkEncaminhamentoSamaritanos}
                        </fieldset>`;
            }
        }
    </script>
</body>
