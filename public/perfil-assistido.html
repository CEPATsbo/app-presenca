<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prontuário Unificado do Assistido</title>
    <style>
        :root {
            --cor-primaria: #34495e; 
            --cor-ae: #007bff;
            --cor-vl: #8e44ad;
            --cor-sam: #e67e22; /* Laranja Samaritanos */
            --cor-borda: #ddd;
            --fundo-selecionado: #e9ecef;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f4f6f9; margin: 0; padding: 20px; }
        .container { width: 100%; max-width: 1200px; margin: 0 auto; box-sizing: border-box; }
        
        .nav-voltar { margin-bottom: 20px; }
        .btn-voltar { background-color: #6c757d; color: white; border: none; padding: 12px 20px; border-radius: 8px; font-weight: bold; text-decoration: none; display: inline-block; cursor: pointer; }
        
        h1 { text-align: center; color: var(--cor-primaria); }
        .hidden { display: none; }
        .erro { color: #dc3545; font-weight: bold; text-align: center; }

        .prontuario-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 25px;
        }

        .card {
            background-color: #fff;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 6px 24px rgba(0,0,0,0.08);
        }
        
        .card-pessoal .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }
        .info-item { background-color: #f8f9fa; padding: 15px; border-radius: 8px; }
        .info-item label { font-size: 0.9em; color: #555; display: block; margin-bottom: 4px; }
        .info-item span { font-weight: bold; font-size: 1.1em; color: #333; }

        .card h2 {
            margin-top: 0;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--cor-borda);
        }
        #card-ae h2 { color: var(--cor-ae); }
        #card-vl h2 { color: var(--cor-vl); }
        #card-sam h2 { color: var(--cor-sam); }

        .historico-container { max-height: 500px; overflow-y: auto; padding-right: 10px; }
        .ciclo-tratamento { border: 1px solid var(--cor-borda); border-radius: 8px; margin-bottom: 20px; }
        .ciclo-header { background-color: #f8f9fa; padding: 15px; border-bottom: 1px solid var(--cor-borda); font-weight: bold; display: flex; justify-content: space-between; flex-wrap: wrap; }
        .ciclo-header .status-ativo { color: #28a745; }
        .ciclo-header .status-concluido { color: #6c757d; }
        .ciclo-header .status-fila { color: #f39c12; }
        .atendimentos-lista { list-style-type: none; padding: 0; margin: 0; }
        .atendimentos-lista li { display: flex; justify-content: space-between; align-items: center; padding: 12px 15px; border-bottom: 1px solid #eee; }
        .atendimentos-lista li:last-child { border-bottom: none; }
        .atendimento-info { display: flex; align-items: center; gap: 10px; }
        .btn, .btn-editar { background-color: #17a2b8; color: white; border: none; padding: 6px 12px; border-radius: 6px; font-size: 0.9em; text-decoration: none; }

        @media (max-width: 768px) {
            body { padding: 10px; }
        }

    </style>
</head>
<body>
    <div class="container">
        <nav class="nav-voltar">
            <a href="javascript:history.back()" class="btn-voltar">⬅ Voltar</a>
        </nav>
        
        <div id="main-content" class="hidden"> <h1 id="header-nome">Prontuário Unificado</h1>
            
            <div id="loading" style="text-align: center; font-size: 1.2em; margin: 40px;">
                <p>Carregando prontuário completo...</p>
            </div>
            
            <div id="prontuario-content" class="prontuario-grid hidden"> 
                
                <div id="card-pessoal" class="card card-pessoal"></div>

                <div id="card-ae" class="card">
                    <h2>Histórico - Assistência Espiritual (AE)</h2>
                    <div id="historico-container-ae" class="historico-container"></div>
                </div>

                <div id="card-vl" class="card">
                    <h2>Histórico - Vinha de Luz (VL)</h2>
                    <div id="historico-container-vl" class="historico-container"></div>
                </div>

                <div id="card-sam" class="card">
                    <h2>Histórico - Samaritanos (SAM)</h2>
                    <div id="historico-container-sam" class="historico-container"></div>
                </div>
                
            </div>
        </div>
    </div>

    <script type="module">
        import { getFirestore, collection, doc, getDoc, query, where, getDocs, orderBy, Timestamp, serverTimestamp, addDoc, setDoc } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore.js";
        
        import { protegerPagina } from '/auth.js';

        const rolesPermitidas = [
            'entrevistador', 'super-admin'
        ];
        
        protegerPagina(rolesPermitidas).then(user => {
            const db = getFirestore(); 
            document.getElementById('main-content').classList.remove('hidden'); 
            inicializarPagina(user, db);
        }).catch(err => {
            console.error(err);
        });

        function inicializarPagina(user, db) {
            const assistidosRef = collection(db, 'assistidos');
            const tratamentosAeRef = collection(db, 'tratamentos_ae');
            const atendimentosAeRef = collection(db, 'atendimentos_ae');
            const tratamentosVlRef = collection(db, 'tratamentos_vl');
            const atendimentosVlRef = collection(db, 'atendimentos_vl');
            const tratamentosSamRef = collection(db, 'tratamentos_samaritanos');
            const atendimentosSamRef = collection(db, 'atendimentos_samaritanos');
            const logAuditoriaRef = collection(db, 'log_auditoria');

            const ui = {
                loading: document.getElementById('loading'),
                prontuarioContent: document.getElementById('prontuario-content'),
                headerNome: document.getElementById('header-nome'),
                cardPessoal: document.getElementById('card-pessoal'),
                cardAE: document.getElementById('historico-container-ae'),
                cardVL: document.getElementById('historico-container-vl'),
                cardSAM: document.getElementById('historico-container-sam')
            };

            const params = new URLSearchParams(window.location.search);
            const assistidoId = params.get('id');

            if (!assistidoId) {
                ui.loading.innerHTML = `<p class="erro">Erro: ID do assistido não fornecido na URL.</p>`;
                return;
            }

            async function registrarLog(acao, detalhes) {
                try {
                    const newLogRef = doc(logAuditoriaRef); 
                    await setDoc(newLogRef, { 
                        timestamp: serverTimestamp(),
                        autor: { uid: user.uid, nome: user.displayName || 'Usuário do Sistema' },
                        acao: acao,
                        detalhes: detalhes
                    });
                } catch (error) { 
                    console.error("Erro ao registrar log (com setDoc):", error); 
                }
            }
            
            function formatarData(timestamp, textoPadrao = "N/A") {
                if (timestamp && typeof timestamp.toDate === 'function') {
                    return timestamp.toDate().toLocaleDateString('pt-br');
                }
                return textoPadrao;
            }

            async function carregarProntuario() {
                try {
                    await registrarLog('Visualização Prontuário Unificado', { assistidoId });

                    const [
                        assistidoSnap,
                        tratamentosAeSnap,
                        atendimentosAeSnap,
                        tratamentosVlSnap,
                        atendimentosVlSnap,
                        tratamentosSamSnap,
                        atendimentosSamSnap
                    ] = await Promise.all([
                        getDoc(doc(assistidosRef, assistidoId)),
                        getDocs(query(tratamentosAeRef, where('assistidoId', '==', assistidoId), orderBy('dataInicio', 'desc'))),
                        getDocs(query(atendimentosAeRef, where('assistidoId', '==', assistidoId), orderBy('dataAtendimento', 'desc'))),
                        getDocs(query(tratamentosVlRef, where('assistidoId', '==', assistidoId), orderBy('dataInicio', 'desc'))),
                        getDocs(query(atendimentosVlRef, where('assistidoId', '==', assistidoId), orderBy('dataAtendimento', 'desc'))),
                        getDocs(query(tratamentosSamRef, where('assistidoId', '==', assistidoId), orderBy('dataRegistroFila', 'desc'))),
                        getDocs(query(atendimentosSamRef, where('assistidoId', '==', assistidoId), orderBy('dataAtendimento', 'desc')))
                    ]);

                    if (!assistidoSnap.exists()) {
                        ui.loading.innerHTML = `<p class="erro">Assistido com ID ${assistidoId} não encontrado.</p>`;
                        return;
                    }

                    const assistido = assistidoSnap.data();
                    
                    const ciclosAE = tratamentosAeSnap.docs.map(d => ({ id: d.id, ...d.data() }));
                    const atendimentosAE = atendimentosAeSnap.docs.map(d => ({ id: d.id, ...d.data() }));
                    
                    const ciclosVL = tratamentosVlSnap.docs.map(d => ({ id: d.id, ...d.data() }));
                    const atendimentosVL = atendimentosVlSnap.docs.map(d => ({ id: d.id, ...d.data() }));

                    const ciclosSAM = tratamentosSamSnap.docs.map(d => ({ id: d.id, ...d.data() }));
                    const atendimentosSAM = atendimentosSamSnap.docs.map(d => ({ id: d.id, ...d.data() }));

                    renderizarDadosPessoais(assistido);
                    renderizarHistoricoAE(ciclosAE, atendimentosAE);
                    renderizarHistoricoVL(ciclosVL, atendimentosVL);
                    renderizarHistoricoSAM(ciclosSAM, atendimentosSAM);
                    
                    ui.loading.classList.add('hidden');
                    ui.prontuarioContent.classList.remove('hidden');

                } catch (error) {
                    console.error("ERRO AO CARREGAR PRONTUÁRIO:", error);
                    ui.loading.innerHTML = `<p class="erro">Falha ao carregar dados. Verifique o console (F12) para mais detalhes.</p>`;
                    if (error.code === 'failed-precondition') {
                         ui.loading.innerHTML += `<br><strong style="font-size: 0.9em;">O Firestore precisa de um índice. Copie o link do console (F12) para criar.</strong>`;
                    }
                }
            }

            function renderizarDadosPessoais(assistido) {
                const dnFormatado = assistido.dn ? new Date(assistido.dn + 'T12:00:00').toLocaleDateString('pt-br') : 'Não informado';
                ui.headerNome.textContent = `Prontuário Unificado de ${assistido.nome}`;
                document.title = `Prontuário - ${assistido.nome}`;
                
                ui.cardPessoal.innerHTML = `
                    <h2>Dados Pessoais</h2>
                    <div class="info-grid">
                        <div class="info-item">
                            <label>Nome Completo</label>
                            <span>${assistido.nome}</span>
                        </div>
                        <div class="info-item">
                            <label>Data de Nascimento</label>
                            <span>${dnFormatado}</span>
                        </div>
                        <div class="info-item">
                            <label>Telefone</label>
                            <span>${assistido.telefone || 'Não informado'}</span>
                        </div>
                    </div>
                `;
            }

            function renderizarHistoricoAE(ciclos, todosAtendimentos) {
                let html = '';
                if (ciclos.length > 0) {
                    ciclos.forEach(ciclo => {
                        const dataInicio = formatarData(ciclo.dataInicio);
                        const statusClasse = ciclo.status === 'ativo' ? 'status-ativo' : 'status-concluido';
                        html += `<div class="ciclo-tratamento"><div class="ciclo-header"><span>Início: ${dataInicio} | Passe: ${ciclo.passe_ciclo_atual || 'N/A'}</span><span class="${statusClasse}">${ciclo.status.replace(/_/g, ' ')}</span></div><ul class="atendimentos-lista">`;
                        const atendimentosDoCiclo = todosAtendimentos.filter(a => a.tratamentoId === ciclo.id);

                        if (atendimentosDoCiclo.length === 0) { html += '<li>Nenhum atendimento registrado.</li>'; }
                        else { atendimentosDoCiclo.forEach(a => { html += renderizarItemAtendimentoAE(a, ciclo.passe_ciclo_atual); }); }
                        html += `</ul></div>`;
                    });
                }
                const passesAvulsos = todosAtendimentos.filter(a => a.tipo === 'avulso');
                if (passesAvulsos.length > 0) {
                    html += `<div class="ciclo-tratamento"><div class="ciclo-header"><span>Passes Avulsos</span></div><ul class="atendimentos-lista">`;
                    passesAvulsos.forEach(a => { html += renderizarItemAtendimentoAE(a, null); });
                    html += `</ul></div>`;
                }
                if (html === '') { html = '<p>Nenhum histórico encontrado na Assistência Espiritual.</p>'; }
                ui.cardAE.innerHTML = html;
            }
            
            function renderizarHistoricoVL(ciclos, todosAtendimentos) {
                let html = '';
                if (ciclos.length > 0) {
                    ciclos.forEach(ciclo => {
                        const dataInicio = formatarData(ciclo.dataInicio);
                        const statusClasse = ciclo.status === 'ativo' ? 'status-ativo' : 'status-concluido';
                        const retornos = ciclo.retornos_solicitados || 0;
                        const realizados = ciclo.atendimentos_realizados || 0;

                        html += `<div class="ciclo-tratamento"><div class="ciclo-header"><span>Início: ${dataInicio} | Status: <span class="${statusClasse}">${ciclo.status.replace(/_/g, ' ')}</span></span><span>Retornos: ${realizados} / ${retornos + 1}</span></div><ul class="atendimentos-lista">`;
                        const atendimentosDoCiclo = todosAtendimentos.filter(a => a.tratamentoId === ciclo.id);

                        if (atendimentosDoCiclo.length === 0) { html += '<li>Nenhum atendimento registrado.</li>'; }
                        else { atendimentosDoCiclo.forEach(a => { html += renderizarItemAtendimentoVL(a); }); }

                        html += `</ul></div>`;
                    });
                }
                if (html === '') { html = '<p>Nenhum histórico encontrado no Vinha de Luz.</p>'; }
                ui.cardVL.innerHTML = html;
            }

            function renderizarHistoricoSAM(ciclos, todosAtendimentos) {
                let html = '';
                if (ciclos.length > 0) {
                    ciclos.forEach(ciclo => {
                        const dataInicio = formatarData(ciclo.dataRegistroFila);
                        let statusClasse = 'status-concluido';
                        if(ciclo.status === 'ativo') statusClasse = 'status-ativo';
                        if(ciclo.status === 'fila') statusClasse = 'status-fila';
                        
                        const realizados = ciclo.atendimentos_realizados || 0;
                        let desencarnadoInfo = ciclo.desencarnadoVinculado ? `<div style="width: 100%; font-size: 0.9em; margin-top: 8px; color: #555; font-weight: normal;">Desencarnado vinculado: <b>${ciclo.desencarnadoVinculado}</b></div>` : '';

                        html += `<div class="ciclo-tratamento"><div class="ciclo-header"><span>Registro: ${dataInicio} | Status: <span class="${statusClasse}">${ciclo.status.toUpperCase()}</span></span><span>Semanas Concluídas: ${realizados}</span>${desencarnadoInfo}</div><ul class="atendimentos-lista">`;
                        
                        const atendimentosDoCiclo = todosAtendimentos.filter(a => a.tratamentoId === ciclo.id);

                        if (atendimentosDoCiclo.length === 0) { html += '<li>Nenhum atendimento (Aguardando na Fila).</li>'; }
                        else { atendimentosDoCiclo.forEach(a => { html += renderizarItemAtendimentoSAM(a); }); }

                        html += `</ul></div>`;
                    });
                }
                if (html === '') { html = '<p>Nenhum histórico encontrado nos Samaritanos.</p>'; }
                ui.cardSAM.innerHTML = html;
            }

            function renderizarItemAtendimentoAE(a, passe_ciclo_atual) {
                const dataAtendimento = formatarData(a.dataAtendimento, "Aguardando Presença");
                let tipoAtendimento = a.tipo?.replace(/_/g, ' ') || 'N/A';
                let infoExtra = ''; let botaoEditarHtml = ''; let iconeHtml = ''; let precisaEntrevista = false;
                
                if (a.tipo !== 'falta' && a.tipo !== 'avulso') {
                    const semanaNum = a.semana || 0;
                    if ([1, 4, 5].includes(semanaNum)) { precisaEntrevista = true; }
                    if (['P3A', 'P3B'].includes(passe_ciclo_atual) && [2, 3].includes(semanaNum)) { precisaEntrevista = true; }
                }
                if (a.tipo === 'avulso') { tipoAtendimento = 'Passe Avulso'; infoExtra = `(${a.passeRecomendado})`; }
                else if (a.tipo === 'falta') { tipoAtendimento = 'Falta'; infoExtra = ''; }
                else { tipoAtendimento = `Semana ${a.semana || '?'}`; infoExtra = `(${a.passeRecomendado})`; }

                if (precisaEntrevista) {
                    if (a.semana === 5 && a.decisao_pre_registrada === true && a.dataAtendimento === null) { iconeHtml = '<span>🔵</span>'; tipoAtendimento = "Reavaliação (Decisão Pronta)"; }
                    else if (a.detalhes_preenchidos === true) { iconeHtml = '<span>✅</span>'; }
                    else { iconeHtml = '<span>📝</span>'; }
                    botaoEditarHtml = `<a href="/entrevista-ae.html?atendimentoId=${a.id}" class="btn btn-editar">Ver / Editar</a>`;
                }
                
                let estiloItem = ''; if (a.dataAtendimento === null && a.semana === 5) { estiloItem = 'style="background-color: #fffbe6;"'; }
                return `<li ${estiloItem}><div class="atendimento-info">${iconeHtml}<span><strong>${dataAtendimento}</strong> - ${tipoAtendimento} ${infoExtra}</span></div>${botaoEditarHtml}</li>`;
            }

            function renderizarItemAtendimentoVL(a) {
                const dataAtendimento = formatarData(a.dataAtendimento);
                const atendimentoNum = `Atendimento ${a.semana || '?'}`;
                const botaoEditarHtml = `<a href="/atendimento-vl.html?atendimentoId=${a.id}" class="btn btn-editar">Ver / Editar</a>`;
                
                return `<li><div class="atendimento-info"><span><strong>${dataAtendimento}</strong> - ${atendimentoNum}</span></div>${botaoEditarHtml}</li>`;
            }

            function renderizarItemAtendimentoSAM(a) {
                const dataAtendimento = formatarData(a.dataAtendimento);
                const atendimentoNum = `Semana ${a.semana || '?'}`;
                const botaoEditarHtml = `<a href="/atendimento-samaritanos.html?atendimentoId=${a.id}" class="btn btn-editar" style="background-color: #e67e22;">Ver / Editar</a>`;
                
                // Lógica dos ícones de status preenchido
                let iconeHtml = a.detalhes_preenchidos ? '<span>✅</span>' : '<span>📝</span>';
                
                return `<li>
                            <div class="atendimento-info">
                                ${iconeHtml}
                                <span><strong>${dataAtendimento}</strong> - ${atendimentoNum}</span>
                            </div>
                            ${botaoEditarHtml}
                        </li>`;
            }

            carregarProntuario();
        }
    </script>
</body>
</html>
