<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cáritas - Planner de Escala</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root { --primary: #2c3e50; --orange: #e67e22; --green: #27ae60; --grey: #7f8c8d; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #f4f6f9; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .nav-header { width: 100%; max-width: 900px; display: flex; justify-content: space-between; margin-bottom: 20px; }
        .btn-voltar { background-color: #6c757d; color: white; padding: 10px 15px; border-radius: 8px; text-decoration: none; font-weight: bold; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 900px; box-sizing: border-box; }
        h1 { color: var(--primary); margin: 0; border-bottom: 2px solid var(--orange); padding-bottom: 10px; }
        .instrucao { background: #fff3e0; padding: 15px; border-radius: 8px; border-left: 5px solid var(--orange); margin: 20px 0; font-size: 0.95em; color: #856404; }
        
        .form-escala { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .full-width { grid-column: 1 / -1; }
        .form-group { display: flex; flex-direction: column; gap: 8px; }
        .form-group label { font-weight: bold; color: #34495e; font-size: 0.9em; }
        .form-group input, .form-group select, .form-group textarea { padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 1em; width: 100%; box-sizing: border-box; }
        
        .readonly-field { background: #f1f1f1; cursor: not-allowed; }
        .ajuste-manual-container { display: flex; align-items: center; gap: 10px; margin-top: 5px; font-size: 0.85em; color: var(--orange); font-weight: bold; }
        
        .section-titulo { background: #f8f9fa; padding: 10px; border-radius: 6px; font-weight: bold; color: var(--orange); margin-top: 10px; }
        .footer-actions { margin-top: 30px; display: flex; justify-content: flex-end; gap: 15px; border-top: 1px solid #eee; padding-top: 20px; flex-wrap: wrap; }
        
        .btn-acao { border: none; padding: 15px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 1em; display: flex; align-items: center; gap: 10px; }
        .btn-salvar { background-color: var(--green); color: white; }
        .btn-whatsapp { background-color: #25D366; color: white; text-decoration: none; }
        .btn-acao:disabled { background-color: #95a5a6; cursor: not-allowed; }
    </style>
</head>
<body>
    <header class="nav-header">
        <a href="/modulo-caritas.html" class="btn-voltar"><i class="fas fa-arrow-left"></i> Painel Cáritas</a>
    </header>

    <main class="container">
        <h1><i class="fas fa-calendar-check"></i> Escala do Domingo Social</h1>
        
        <div class="instrucao">
            <i class="fas fa-info-circle"></i> <strong>Regra de Agendamento:</strong> Por padrão, o trabalho ocorre no <strong>3º domingo</strong>. É possível antecipar para o 2º, mas nunca adiar para o 4º.
        </div>

        <form id="form-escala" class="form-escala">
            <div class="form-group">
                <label>Mês de Referência (Escala Futura)</label>
                <select id="mes-referencia" required></select>
            </div>

            <div class="form-group">
                <label>Data do Trabalho (3º Domingo)</label>
                <input type="date" id="data-trabalho" class="readonly-field" readonly required>
                <div class="ajuste-manual-container">
                    <input type="checkbox" id="permitir-ajuste"> 
                    <label for="permitir-ajuste">Ajustar data manualmente (Exceção)</label>
                </div>
            </div>
            
            <div class="form-group full-width">
                <label>Sugestão de Tema (12 Temas Base)</label>
                <select id="sugestao-tema">
                    <option value="">-- Selecione um dos 12 temas ou escreva no campo abaixo --</option>
                    <option value="1) A vida não acabou: recomeços possíveis">1) A vida não acabou: recomeços possíveis</option>
                    <option value="2) Quando falta fora, a gente precisa segurar dentro">2) Quando falta fora, a gente precisa segurar dentro</option>
                    <option value="3) Coragem também é pedir ajuda">3) Coragem também é pedir ajuda</option>
                    <option value="4) Família não é perfeição: é presença">4) Família não é perfeição: é presença</option>
                    <option value="5) Pequenos passos também são vitória">5) Pequenos passos também são vitória</option>
                    <option value="6) Humildade e dignidade caminham juntas">6) Humildade e dignidade caminham juntas</option>
                    <option value="7) A esperança não é ilusão: é força de atravessar">7) A esperança não é ilusão: é força de atravessar</option>
                    <option value="8) Fraternidade: ninguém se salva sozinho">8) Fraternidade: ninguém se salva sozinho</option>
                    <option value="9) O que eu posso controlar quando quase nada está sob controle?">9) O que eu posso controlar quando quase nada está sob controle?</option>
                    <option value="10) Perdão que alivia (sem esquecer e sem se humilhar)">10) Perdão que alivia (sem esquecer e sem se humilhar)</option>
                    <option value="11) Amor como atitude: carinho no meio do caos">11) Amor como atitude: carinho no meio do caos</option>
                    <option value="12) Gratidão sem negar a dor">12) Gratidão sem negar a dor</option>
                </select>
            </div>

            <div class="form-group full-width">
                <label>Tema da Reflexão (Texto Final) *</label>
                <textarea id="tema-prelecao" rows="2" placeholder="O texto aparecerá aqui..." required></textarea>
            </div>

            <div class="full-width section-titulo">Passe de Harmonização e Sustentação</div>
            <div class="form-group">
                <label>Médium 1</label>
                <select id="escala-medium1" class="select-voluntario"><option value="">Carregando...</option></select>
            </div>
            <div class="form-group">
                <label>Médium 2</label>
                <select id="escala-medium2" class="select-voluntario"><option value="">Carregando...</option></select>
            </div>

            <div class="full-width section-titulo">Palestra e Acolhimento</div>
            <div class="form-group">
                <label>Preletor(a)</label>
                <select id="escala-preletor" class="select-voluntario"><option value="">Carregando...</option></select>
            </div>
            <div class="form-group">
                </div>
            <div class="form-group">
                <label>Entrevistador(a) 1</label>
                <select id="escala-entrevistador1" class="select-voluntario"><option value="">Carregando...</option></select>
            </div>
            <div class="form-group">
                <label>Entrevistador(a) 2</label>
                <select id="escala-entrevistador2" class="select-voluntario"><option value="">Carregando...</option></select>
            </div>

            <div class="full-width section-titulo">Escola de Pais e Evangelização Infantil</div>
            <div class="form-group">
                <label>Membro Escola de Pais</label>
                <select id="escala-escola-pais" class="select-voluntario"><option value="">Carregando...</option></select>
            </div>
            <div class="form-group"></div>
            <div class="form-group">
                <label>Evangelizador(a) 1</label>
                <select id="escala-evangelizador1" class="select-voluntario"><option value="">Carregando...</option></select>
            </div>
            <div class="form-group">
                <label>Evangelizador(a) 2</label>
                <select id="escala-evangelizador2" class="select-voluntario"><option value="">Carregando...</option></select>
            </div>
            <div class="form-group">
                <label>Evangelizador(a) 3</label>
                <select id="escala-evangelizador3" class="select-voluntario"><option value="">Carregando...</option></select>
            </div>

            <div class="footer-actions full-width">
                <button type="button" id="btn-whatsapp" class="btn-acao btn-whatsapp"><i class="fab fa-whatsapp"></i> Compartilhar Escala</button>
                <button type="submit" class="btn-acao btn-salvar" id="btn-gravar">Gravar Escala Mensal</button>
            </div>
        </form>
    </main>

    <script type="module">
        import { initializeApp, getApps, getApp } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-app.js";
        import { getFirestore, collection, getDocs, query, where, orderBy, serverTimestamp, Timestamp, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore.js";
        import { protegerPagina } from '/auth.js';

        const firebaseConfig = { apiKey: "AIzaSyBV7RPjk3cFTqL-aIpflJcUojKg1ZXMLuU", authDomain: "voluntarios-ativos---cepat.firebaseapp.com", projectId: "voluntarios-ativos---cepat", storageBucket: "voluntarios-ativos---cepat.firebasestorage.app", messagingSenderId: "66122858261", appId: "1:66122858261:web:7fa21f1805463b5c08331c" };
        const app = getApps().length === 0 ? initializeApp(firebaseConfig) : getApp();
        const db = getFirestore(app);

        protegerPagina(['super-admin','diretor','tesoureiro','conselheiro','recepcionista','entrevistador','caritas']).then(user => { inicializarPlanner(user); });

        async function inicializarPlanner(user) {
            const selectMes = document.getElementById('mes-referencia');
            const inputData = document.getElementById('data-trabalho');
            const checkAjuste = document.getElementById('permitir-ajuste');
            const sugestaoTema = document.getElementById('sugestao-tema');
            const temaFinal = document.getElementById('tema-prelecao');
            const form = document.getElementById('form-escala');

            popularMeses(selectMes);
            await carregarVoluntarios();

            sugestaoTema.onchange = () => { if (sugestaoTema.value) temaFinal.value = sugestaoTema.value; };

            selectMes.onchange = async () => {
                const [mes, ano] = selectMes.value.split('|').map(Number);
                const mesTexto = selectMes.options[selectMes.selectedIndex].text;
                const dataCalculada = calcularTerceiroDomingo(mes, ano);
                inputData.value = new Date(dataCalculada.getTime() - (dataCalculada.getTimezoneOffset() * 60000)).toISOString().split('T')[0];

                const idDoc = mesTexto.replace(/\s+/g, '').replace(/\//g, '_');
                temaFinal.value = ""; document.querySelectorAll('.select-voluntario').forEach(s => s.value = "");

                try {
                    const docSnap = await getDoc(doc(db, "escalaCaritas", idDoc));
                    if (docSnap.exists()) {
                        const d = docSnap.data();
                        temaFinal.value = d.tema || "";
                        if (d.equipe) {
                            document.getElementById('escala-medium1').value = d.equipe.mediuns[0] || "";
                            document.getElementById('escala-medium2').value = d.equipe.mediuns[1] || "";
                            document.getElementById('escala-preletor').value = d.equipe.preletor || "";
                            document.getElementById('escala-entrevistador1').value = d.equipe.entrevistadores ? d.equipe.entrevistadores[0] : (d.equipe.entrevistador || "");
                            document.getElementById('escala-entrevistador2').value = d.equipe.entrevistadores ? d.equipe.entrevistadores[1] : "";
                            document.getElementById('escala-escola-pais').value = d.equipe.escolaPais || "";
                            document.getElementById('escala-evangelizador1').value = d.equipe.evangelizadores[0] || "";
                            document.getElementById('escala-evangelizador2').value = d.equipe.evangelizadores[1] || "";
                            document.getElementById('escala-evangelizador3').value = d.equipe.evangelizadores[2] || "";
                        }
                    }
                } catch (e) { console.error(e); }
            };

            selectMes.dispatchEvent(new Event('change'));

            checkAjuste.onchange = () => {
                inputData.readOnly = !checkAjuste.checked;
                inputData.style.background = checkAjuste.checked ? "#fff" : "#f1f1f1";
                if (!checkAjuste.checked) selectMes.dispatchEvent(new Event('change'));
            };

            form.onsubmit = async (e) => {
                e.preventDefault();
                const btn = document.getElementById('btn-gravar');
                btn.disabled = true; btn.textContent = "Gravando...";
                const idDoc = selectMes.options[selectMes.selectedIndex].text.replace(/\s+/g, '').replace(/\//g, '_');

                const escala = {
                    dataTrabalho: Timestamp.fromDate(new Date(inputData.value + 'T12:00:00')),
                    mesReferencia: selectMes.options[selectMes.selectedIndex].text,
                    tema: temaFinal.value,
                    equipe: {
                        mediuns: [document.getElementById('escala-medium1').value, document.getElementById('escala-medium2').value],
                        preletor: document.getElementById('escala-preletor').value,
                        entrevistadores: [document.getElementById('escala-entrevistador1').value, document.getElementById('escala-entrevistador2').value],
                        escolaPais: document.getElementById('escala-escola-pais').value,
                        evangelizadores: [document.getElementById('escala-evangelizador1').value, document.getElementById('escala-evangelizador2').value, document.getElementById('escala-evangelizador3').value]
                    },
                    ultimaEdicaoEm: serverTimestamp(),
                    editadoPor: user.uid
                };

                try {
                    await setDoc(doc(db, "escalaCaritas", idDoc), escala, { merge: true });
                    alert("Escala gravada com sucesso!");
                } catch (err) { alert("Erro: " + err.message); }
                btn.disabled = false; btn.textContent = "Gravar Escala Mensal";
            };

            document.getElementById('btn-whatsapp').onclick = () => {
                const dataF = inputData.value.split('-').reverse().join('/');
                const equipe = {
                    m1: document.getElementById('escala-medium1').value,
                    m2: document.getElementById('escala-medium2').value,
                    pr: document.getElementById('escala-preletor').value,
                    e1: document.getElementById('escala-entrevistador1').value,
                    e2: document.getElementById('escala-entrevistador2').value,
                    ep: document.getElementById('escala-escola-pais').value,
                    v1: document.getElementById('escala-evangelizador1').value,
                    v2: document.getElementById('escala-evangelizador2').value,
                    v3: document.getElementById('escala-evangelizador3').value
                };

                let msg = `*ESCALA DOMINGO SOCIAL - ${dataF}*%0A%0A`;
                msg += `*TEMA:* ${temaFinal.value}%0A%0A`;
                msg += `*PASSE E SUSTENTAÇÃO:*%0A- ${equipe.m1 || 'A definir'}%0A- ${equipe.m2 || 'A definir'}%0A%0A`;
                msg += `*PALESTRA:* ${equipe.pr || 'A definir'}%0A`;
                msg += `*ENTREVISTADORES:*%0A- ${equipe.e1 || 'A definir'}%0A- ${equipe.e2 || 'A definir'}%0A%0A`;
                msg += `*ESCOLA DE PAIS:* ${equipe.ep || 'A definir'}%0A%0A`;
                msg += `*EVANGELIZAÇÃO:*%0A- ${equipe.v1 || 'A definir'}%0A- ${equipe.v2 || 'A definir'}%0A- ${equipe.v3 || 'A definir'}`;

                window.open(`https://wa.me/?text=${msg}`, '_blank');
            };
        }

        function popularMeses(select) {
            const meses = ["Janeiro", "Fevereiro", "Março", "Abril", "Maio", "Junho", "Julho", "Agosto", "Setembro", "Outubro", "Novembro", "Dezembro"];
            const hoje = new Date(); let m = hoje.getMonth(), a = hoje.getFullYear();
            for (let i = 0; i < 12; i++) {
                const opt = document.createElement('option'); opt.value = `${m}|${a}`; opt.textContent = `${meses[m]} / ${a}`;
                select.appendChild(opt); m++; if (m > 11) { m = 0; a++; }
            }
        }

        function calcularTerceiroDomingo(m, a) {
            let d = new Date(a, m, 1), c = 0;
            while (c < 3) { if (d.getDay() === 0) c++; if (c < 3) d.setDate(d.getDate() + 1); }
            return d;
        }

        async function carregarVoluntarios() {
            const selects = document.querySelectorAll('.select-voluntario');
            try {
                const snap = await getDocs(query(collection(db, "voluntarios"), where("statusVoluntario", "==", "ativo"), orderBy("nome")));
                let opt = '<option value="">Selecione...</option>';
                snap.forEach(d => { opt += `<option value="${d.data().nome}">${d.data().nome}</option>`; });
                selects.forEach(s => s.innerHTML = opt);
            } catch (e) { console.error(e); }
        }
    </script>
</body>
</html>
